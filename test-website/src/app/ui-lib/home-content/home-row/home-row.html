<div class="container">
  @if (dataResource.hasValue()) {
    {{ dataResource.value().value.length }}
    @for (item of dataResource.value().value; track $index) {
    <div>
      <ng-container *ngComponentOutlet="getItemComponent(item.HomeRowTypeId) ;inputs: { parentId: item.Id }"></ng-container>
    </div>
    <!-- <coffee-simple-message [parentId]="item.Id">

    </coffee-simple-message> -->
    }
  } @else if (dataResource.error()) {
    <div>Could not load user information: {{ dataResource.error()?.message }}</div>
  } @else if (dataResource.isLoading()) {
    <div>Loading user info...</div>
  }
</div>
